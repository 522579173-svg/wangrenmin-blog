backend:
  name: git-gateway
  branch: main
  site_domain: wangrenmin.com

media_folder: "images"
public_folder: "/images"

locale: "zh_Hans"

site_url: https://wangrenmin.com
display_url: https://wangrenmin.com

collections:
  - name: "articles"
    label: "文章管理"
    label_singular: "文章"
    folder: "/"
    create: true
    slug: "article-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "文章标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "分类", name: "category", widget: "select", options: ["日常保健", "饮食营养", "运动健康", "心理健康", "家庭健康", "急救知识"] }
      - { label: "阅读时长", name: "readtime", widget: "string", default: "5 分钟" }
      - { label: "摘要", name: "subtitle", widget: "text" }
      - { label: "正文", name: "body", widget: "markdown" }
